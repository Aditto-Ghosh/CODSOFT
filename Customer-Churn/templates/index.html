<!DOCTYPE html>
<html>
<head>
    <title>Customer Churn Prediction</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:linear-gradient(135deg,#141e30,#243b55);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:400px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            color:#243b55;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:8px;
            background:#f1f1f1;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:8px;
            background:#243b55;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#141e30;
        }

        h2{
            text-align:center;
            color:green;
            margin-top:20px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Customer Churn Prediction</h1>

        <form action="/predict" method="POST">

            <input type="number" name="credit_score" placeholder="Credit Score" required>

            <input type="number" name="age" placeholder="Age" required>

            <input type="number" name="tenure" placeholder="Tenure" required>

            <input type="number" step="any" name="balance" placeholder="Balance" required>

            <input type="number" name="products" placeholder="Number of Products" required>

            <input type="number" step="any" name="salary" placeholder="Estimated Salary" required>

            <button type="submit">Predict</button>

        </form>

        <h2>{{ prediction_text }}</h2>

    </div>

</body>
</html>
